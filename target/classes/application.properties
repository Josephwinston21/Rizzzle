spring.application.name=rizzzle-backend

# Database configurations
spring.datasource.url=jdbc:mysql://localhost:3306/rizzzle_db
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# Server configurations
server.port=8080

# AWS configurations
aws.accessKeyId=your_access_key
aws.secretKey=your_secret_key
aws.region=us-east-1

# Twilio configurations
twilio.accountSid=your_account_sid
twilio.authToken=your_auth_token

# HubSpot configurations
hubspot.apiKey=your_hubspot_api_key

# Razorpay configurations
razorpay.apiKey=your_razorpay_api_key

# Kafka configurations
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=rizzzle-group

# Elasticsearch configurations
elasticsearch.host=localhost
elasticsearch.port=9200

# Other configurations
logging.level.org.springframework=INFO

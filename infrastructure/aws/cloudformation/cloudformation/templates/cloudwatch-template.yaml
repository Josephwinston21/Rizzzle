AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudWatch alarms and log groups for Rizzzle application'

Resources:
  RizzzleLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: '/aws/rizzzle/application-logs'
      RetentionInDays: 30

  CPUAlarm:
    Type: 'AWS::CloudWatch::Alarm'
    Properties:
      AlarmDescription: 'Alarm if CPU exceeds 80%'
      Namespace: 'AWS/EC2'
      MetricName: 'CPUUtilization'
      Dimensions:
        - Name: 'InstanceId'
          Value: 'i-xxxxxxxx'
      Statistic: 'Average'
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: 'GreaterThanThreshold'
      AlarmActions:
        - 'arn:aws:sns:us-east-1:123456789012:MySNSTopic'

#
#Instructions:
#
#Configure:
#  Replace i-xxxxxxxx with your EC2 instance ID.
#  Replace MySNSTopic with your actual SNS topic ARN.
#Run:
#  bash
#  Copy code
#  aws cloudformation create-stack --stack-name RizzzleCloudWatchStack --template-body file://cloudwatch-template.yaml
